<div class="login-page">
  <div class="login-card card border-0">
    <div class="login-brand">
      <div class="login-logo-wrap">
        <img class="login-logo" src="assets/images/logo-dalba-300x141.webp" alt="Logo Dalba">
      </div>
      <div>
        <h1 class="login-title mb-2">Redefinir senha</h1>
        <p class="login-subtitle mb-0">Cadastre uma nova senha usando o token enviado por e-mail.</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="mb-3">
        <label class="form-label required">Token</label>
        <input class="form-control form-control-lg" formControlName="token" placeholder="Cole o token recebido" />
        <div class="field-error" *ngIf="form.get('token')?.touched && form.get('token')?.hasError('required')">Informe o token.</div>
      </div>

      <div class="mb-3">
        <label class="form-label required">Nova senha</label>
        <input class="form-control form-control-lg" type="password" formControlName="novaSenha" placeholder="Digite a nova senha" />
        <div class="field-error" *ngIf="form.get('novaSenha')?.touched && form.get('novaSenha')?.hasError('required')">Informe a nova senha.</div>
        <div class="field-error" *ngIf="form.get('novaSenha')?.touched && form.get('novaSenha')?.hasError('minlength')">A senha deve ter pelo menos 6 caracteres.</div>
      </div>

      <div class="mb-3">
        <label class="form-label required">Confirmar senha</label>
        <input class="form-control form-control-lg" type="password" formControlName="confirmacaoSenha" placeholder="Confirme a nova senha" />
        <div class="field-error" *ngIf="form.get('confirmacaoSenha')?.touched && form.get('confirmacaoSenha')?.hasError('required')">Confirme a nova senha.</div>
      </div>

      <div class="alert alert-danger py-2" role="alert" *ngIf="error">{{ error }}</div>
      <div class="alert alert-success py-2" role="status" *ngIf="message">{{ message }}</div>

      <div class="d-grid gap-2 mt-4">
        <button class="btn btn-primary btn-lg login-submit" [disabled]="loading || form.invalid">
          {{ loading ? 'Salvando...' : 'Salvar nova senha' }}
        </button>
        <button class="btn btn-outline-secondary btn-lg reset-back" type="button" (click)="goToLogin()">
          Voltar para login
        </button>
      </div>
    </form>
  </div>
</div>
