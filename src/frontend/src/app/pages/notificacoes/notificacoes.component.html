<section class="page-shell">
  <div class="toolbar"><h2>Notificações</h2></div>
  <div class="card" style="padding:20px">
    <table>
      <tr>
        <th>Tipo</th>
        <th>Título</th>
        <th>Status</th>
        <th>Data</th>
        <th>Detalhe</th>
      </tr>
      <tr *ngFor="let item of notificacoes">
        <td>{{item.tipoNotificacao}}</td>
        <td>{{item.titulo}}</td>
        <td>{{item.statusEnvio}}</td>
        <td>{{dataDaNotificacao(item) | date:'short'}}</td>
        <td>
          <span *ngIf="item.statusEnvio === 'Falha'" class="text-danger">{{item.erro || 'Falha ao enviar.'}}</span>
          <span *ngIf="item.statusEnvio !== 'Falha'" class="text-muted">{{item.destinatario}}</span>
        </td>
      </tr>
    </table>
  </div>
</section>
